project_name: new-build-governance-agent
project_type: agent
use_case:
  primary: AI agent with tools
  secondary:
    - Infrastructure / deployment code
  notes: Governance framework and scaffolding automation for governed builds. Use-case classification informs controls but does not override selected risk_tier or governance_level.
risk_tier: high
governance_level: 3
repository_model: single-repo
owner:
  name: Adam Goodwin
  role: owner
technical_lead:
  name: codex session
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: false
  handles_money: false
  notes: ""
controls:
  required_docs:
    - README.md
    - START_HERE.md
    - docs/architecture.md
    - docs/current-build-pathway.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/policy/durable-development-engineering-policy.md
    - docs/standards/engineering-governance-by-use-case.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
exceptions: []
agent_controls:
  applicable: true
  autonomy_level: A1
  model_registry: []
  prompt_registry: []
