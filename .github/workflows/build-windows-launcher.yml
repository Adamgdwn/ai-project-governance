name: Build Windows Launcher

on:
  pull_request:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-launcher:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build launcher and package
        shell: pwsh
        run: ./scripts/build-windows-launcher.ps1

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: NewBuildGovernanceAgent-Windows
          path: dist/NewBuildGovernanceAgent-Windows.zip
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "dist/NewBuildGovernanceAgent-Windows.zip"
          $notes = "Windows package for New Build Governance Agent. Unzip it, then double-click NewBuildGovernanceAgent.exe."
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag $asset --clobber
          } else {
              gh release create $tag $asset --title "New Build Governance Agent $tag" --notes $notes
          }
