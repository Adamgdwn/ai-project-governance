project_name: example-project
project_type: application
use_case:
  primary: Web application / SaaS
  secondary: []
  notes: Use-case classification informs controls but does not override selected risk_tier or governance_level.
risk_tier: medium
governance_level: 2
repository_model: single-repo
owner:
  name: Project Owner
  role: owner
technical_lead:
  name: Technical Lead
  role: technical-lead
status: active
environments:
  - dev
  - staging
  - prod
data_classification:
  handles_sensitive_data: false
  handles_money: false
  notes: ""
controls:
  required_docs:
    - README.md
    - START_HERE.md
    - docs/architecture.md
    - docs/current-build-pathway.md
    - docs/manual.md
    - docs/roadmap.md
    - docs/policy/durable-development-engineering-policy.md
    - docs/standards/engineering-governance-by-use-case.md
    - docs/deployment-guide.md
    - docs/runbook.md
    - docs/CHANGELOG.md
    - docs/risks/risk-register.md
  machine_enforcement:
    - required-file-check
    - lint
    - tests
    - secret-scan
exceptions: []
agent_controls:
  applicable: false
  autonomy_level: A0
  model_registry: []
  prompt_registry: []
